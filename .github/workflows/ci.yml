name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Type Check
        run: npm run type-check
        continue-on-error: true

      - name: Run Tests
        run: npm run test:ci

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Pipeline Summary
        run: |
          echo ''
          echo '╔══════════════════════════════════════════╗'
          echo '║  ✅ CI/CD Pipeline Passed Successfully!  ║'
          echo '║  🟠 Stellar Orange Belt — Level 3 Ready  ║'
          echo '╚══════════════════════════════════════════╝'
          echo ''
